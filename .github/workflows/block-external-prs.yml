name: Block External PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  block-fork-prs:
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
    concurrency:
      group: block-external-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Comment once and close PRs from forks
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const headRepo = context.payload.pull_request.head.repo.full_name;
            const baseRepo = context.payload.pull_request.base.repo.full_name;
            const defaultBranch = context.payload.repository.default_branch;
            const contributingUrl = `https://github.com/${owner}/${repo}/blob/${defaultBranch}/Markdown/CONTRIBUTING.md`;
            const marker = "<!-- external-pr-block -->";

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const alreadyCommented = comments.some((comment) =>
              (comment.body || "").includes(marker)
            );

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: [
                  marker,
                  "Thanks for the PR! This repository doesn't accept contributions from external sources right now.",
                  `You can read up on the current status in the [contributing file](${contributingUrl}).`,
                  "",
                  `Head repo: ${headRepo}`,
                  `Base repo: ${baseRepo}`,
                ].join("\n"),
              });
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              state: "closed",
            });
